# kitty.conf — jisungbin
#
# 전체 옵션 레퍼런스는 kitty.conf.full-reference (원본 템플릿 백업)에서 찾는다.
# 변경 적용: kitty 창에서 ⌃⌘, (reload) 또는 재시작.

#: ── Fonts ─────────────────────────────────────────────
font_family       D2Coding ligature
bold_font         auto
italic_font       auto
bold_italic_font  auto
font_size         25.0
disable_ligatures never

#: ── Cursor ────────────────────────────────────────────
cursor_shape beam

#: ── Color: Catppuccin Latte ───────────────────────────
#: 공식 팔레트(catppuccin/kitty). 색만 바꾸려면 이 블록을 교체.
foreground              #4c4f69
background              #eff1f5
selection_foreground    #eff1f5
selection_background    #dc8a78
cursor                  #dc8a78
cursor_text_color       #eff1f5
scrollbar_handle_color  #7c7f93
scrollbar_track_color   #bcc0cc
url_color               #dc8a78
active_border_color     #7287fd
inactive_border_color   #9ca0b0
bell_border_color       #df8e1d

active_tab_foreground   #eff1f5
active_tab_background   #8839ef
inactive_tab_foreground #4c4f69
inactive_tab_background #9ca0b0
tab_bar_background      #bcc0cc

mark1_foreground #eff1f5
mark1_background #7287fd
mark2_foreground #eff1f5
mark2_background #8839ef
mark3_foreground #eff1f5
mark3_background #209fb5

color0  #5c5f77
color8  #6c6f85
color1  #d20f39
color9  #d20f39
color2  #40a02b
color10 #40a02b
color3  #df8e1d
color11 #df8e1d
color4  #1e66f5
color12 #1e66f5
color5  #ea76cb
color13 #ea76cb
color6  #179299
color14 #179299
color7  #acb0be
color15 #bcc0cc

background_opacity 1.0
background_blur    0

#: ── Window ────────────────────────────────────────────
window_padding_width 20
enabled_layouts      splits,stack

#: ── Tab bar ───────────────────────────────────────────
tab_bar_edge     top
tab_bar_style    fade
tab_fade         1
tab_bar_min_tabs 1

#: ── macOS ─────────────────────────────────────────────
macos_option_as_alt no

#: ── Keymaps ───────────────────────────────────────────
map --allow-fallback=shifted,ascii cmd+c copy_or_noop
map --allow-fallback=shifted,ascii cmd+v paste_from_clipboard
map --allow-fallback=shifted,ascii cmd+] next_tab
map --allow-fallback=shifted,ascii cmd+[ previous_tab
map --allow-fallback=shifted,ascii cmd+w close_tab
map --allow-fallback=shifted,ascii cmd+f search_scrollback
map --allow-fallback=shifted,ascii shift+cmd+\ launch --location=vsplit
map --allow-fallback=shifted,ascii shift+cmd+d detach_window new-tab
